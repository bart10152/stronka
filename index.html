<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Stefan Stefanowicz</title>

<style>
    body{
        margin:0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff00cc, #00ffff, #ffff00);
        color:#111;
        display:flex;
        flex-direction:column;
        min-height:100vh;
        text-align:center;
    }

    header{
        padding:20px;
        background:#000;
        color:#fff;
        font-size:24px;
        letter-spacing:2px;
    }

    main{
        flex:1;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        gap:20px;
    }

    h1{
        font-size:40px;
        background:#fff;
        padding:10px 20px;
        border-radius:10px;
    }

    .emoji{
        font-size:80px;
    }

    blockquote{
        font-style:italic;
        font-size:18px;
        max-width:500px;
        background:rgba(255,255,255,0.7);
        padding:15px;
        border-radius:10px;
    }

    footer{
        padding:10px;
        background:#000;
        color:#fff;
        font-size:14px;
    }
</style>

</head>

<body>

<header>
Minimalistyczna Strona
</header>

<main>

<h1>Stefan Stefanowicz</h1>

<div class="emoji">
😎
</div>

<blockquote>
„Not all those who wander are lost.” – J.R.R. Tolkien
</blockquote>

</main>

<footer>
Strona testowa • 2026 • Miłego dnia!
</footer>

</body>
</html>
