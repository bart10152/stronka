<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Stefan Stefanowicz</title>

<style>

body{
    margin:0;
    font-family: Comic Sans MS, Arial, sans-serif;
    background:black;
    color:white;
    text-align:center;
    overflow:hidden;
}

/* animowana tęcza */
.rainbow{
    position:fixed;
    width:200%;
    height:200%;
    background: linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        lime,
        cyan,
        blue,
        violet,
        red
    );
    background-size:800% 800%;
    animation:rainbowMove 8s linear infinite;
    opacity:0.3;
    z-index:-1;
}

@keyframes rainbowMove{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

header{
    padding:20px;
    font-size:30px;
    text-shadow:0 0 10px hotpink;
}

main{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

h1{
    font-size:45px;
    color:#ffccff;
    text-shadow:0 0 15px cyan;
}

.emoji{
    font-size:100px;
    animation:bounce 1s infinite alternate;
}

@keyframes bounce{
    from{transform:translateY(0);}
    to{transform:translateY(-20px);}
}

blockquote{
    font-style:italic;
    font-size:20px;
    margin-top:20px;
    color:#ffff99;
    text-shadow:0 0 10px pink;
}

footer{
    position:fixed;
    bottom:10px;
    width:100%;
    font-size:14px;
    color:#aaa;
}

</style>
</head>

<body>

<div class="rainbow"></div>

<header>
🌈 NYAN INTERNET PAGE 🌈
</header>

<main>

<h1>Stefan Stefanowicz</h1>

<div class="emoji">
🐱
</div>

<blockquote>
"All we have to decide is what to do with the time that is given us." – J.R.R. Tolkien
</blockquote>

</main>

<footer>
nyan nyan nyan • strona kosmiczna • 2026 🚀
</footer>

</body>
</html>
